<!DOCTYPE html>
<html>
<head>
    <title>Shaadi.com Profile Form</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
    <h1>Create Your Shaadi.com Profile</h1>

    <form>
        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name"><br><br>

        <label for="photo">Upload Profile Photo:</label><br>
        <input type="file" id="photo" name="photo"><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="gender">Gender:</label><br>
        <input type="text" id="gender" name="gender" placeholder="Enter your gender"><br><br>

        <label for="preferred_gender">Preferred Gender:</label><br>
        <input type="text" id="preferred_gender" name="preferred_gender" placeholder="Enter preferred gender"><br><br>

        <label for="religion">Religion:</label><br>
        <input type="text" id="religion" name="religion" placeholder="Enter your religion"><br><br>

        <label for="country">Country:</label><br>
        <input type="text" id="country" name="country" placeholder="Enter your country"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="text" id="phone" name="phone" placeholder="Enter your phone number"><br><br>

        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" placeholder="Enter your city"><br><br>

        <label for="height">Height (in cm):</label><br>
        <input type="text" id="height" name="height" placeholder="Enter your height"><br><br>

        <label for="diet">Diet Preference:</label><br>
        <input type="text" id="diet" name="diet" placeholder="Vegetarian / Non-Vegetarian"><br><br>

        <label for="education">Educational Qualification:</label><br>
        <input type="text" id="education" name="education" placeholder="Enter your qualification"><br><br>

        <label for="job">Current Job Situation:</label><br>
        <input type="text" id="job" name="job" placeholder="Enter your job status"><br><br>

        <fieldset>
            <legend>Interests / Hobbies:</legend>
            <input type="checkbox" id="music" name="interests" value="Music">
            <label for="music">Music</label><br>
            <input type="checkbox" id="travel" name="interests" value="Travel">
            <label for="travel">Travel</label><br>
            <input type="checkbox" id="reading" name="interests" value="Reading">
            <label for="reading">Reading</label><br>
            <input type="checkbox" id="sports" name="interests" value="Sports">
            <label for="sports">Sports</label><br>
        </fieldset><br><br>

        <button type="submit">Create Profile</button>
    </form>
</body>
</html>
